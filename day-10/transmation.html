         /* Transform */
         body{
            padding: 0;

         }.container{
            border: 2px solid black;
            padding: 2px;

         }
         .kotak1{transition:all 1s ease;}

         .kotak4{transition:all 1s ease-in-out;}
         .kotak5{transition:all 1s linear;}
         .kotak{
            width: 100px;
            height: 100px;
            background-color: lightblue;
