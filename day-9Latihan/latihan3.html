<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    <style>
        *{
            padding: 0;
            margin: 0;
        }.container{
            margin: 50px auto;
            width: 80%;
            display: grid;
            grid-template-columns: repeat(3,1fr);
            border: 2px solid black;
            gap: 2px;
            box-sizing: border-box;
        }img{
            width: 100%;
            height: 100%;
        }h1{
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>My Lilith</h1>
    <div class="container">
        <div class="image"><img src="img/1.jfif" alt=""></div>
        <div class="image"><img src="img/2.jfif" alt=""></div>
        <div class="image"><img src="img/3.jfif" alt=""></div>
        <div class="image"><img src="img/4.jfif" alt=""></div>
        <div class="image"><img src="img/5.jfif" alt=""></div>
        <div class="image"><img src="img/6.jfif" alt=""></div>
    </div>
</body>
</html>
