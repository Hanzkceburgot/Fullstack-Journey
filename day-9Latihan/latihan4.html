<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout</title>
    <style>
        *{
            padding: 0;
            margin: 0;
        }.container{
            width: 80%;
            margin: 50px auto;
            display: grid;
            box-sizing: border-box;
            grid-template-areas:"header header header header"
            "sideKiri main main sideKanan"
            "sideKiri main main sideKanan"
            "footer footer footer footer";
            grid-template-rows:100px 200px 200px 80px;

        }.main{
            grid-area: main;
            /* width: 100%;
            height: 200px; */
            background-color: lightblue;
        }.sideKiri{
            grid-area: sideKiri;
            /* width: 100%;
            height: 200px; */
            background-color: lightgreen;
        }.sideKanan{
            grid-area: sideKanan;
            /* width: 100%;
            height: 200px; */
            background-color: lightpink;
        }.footer{
            grid-area: footer;
            /* width: 100%;
            height: 200px; */
            background-color: lightgray;
        }.header{
            grid-area: header;
            /* width: 100%;
            height: 200px; */
            background-color: lightcoral;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"></div>
        <div class="main"></div>
        <div class="sideKiri"></div>
        <div class="sideKanan"></div>
        <div class="footer"></div>
    </div>
</body>
</html>
