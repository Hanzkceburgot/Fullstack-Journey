<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery</title>
  <style>
    *{
      margin: 0;
      padding: 0;
    }
    body{
      background-color: #aaaaaa;
      text-align: center;
      margin: 50px;
    }
    .gallery{
      display: grid;
      width: 40%;
      margin: 20px auto;
      border:10px solid white ;
      list-style:none ;
      box-shadow: 2px 2px 2px rgb(0, 0, 0,0.3);
      grid-template-columns: repeat(auto-fit,minmax(150px,1fr));
      box-sizing: border-box;
    }
    img{
      display: block;
      width: 100%;
    }
  </style>
</head>
<body>
  <h1>My Gallery</h1>
  <ul class="gallery">
    <li><img src="img/image-1.jpg" alt=""></li>
    <li><img src="img/image-2.jpg" alt=""></li>
    <li><img src="img/image-3.jpg" alt=""></li>
    <li><img src="img/image-4.jpg" alt=""></li>
    <li><img src="img/image-5.jpg" alt=""></li>
    <li><img src="img/image-6.jpg" alt=""></li>
    <li><img src="img/image-7.jpg" alt=""></li>
    <li><img src="img/image-8.jpg" alt=""></li>
    <li><img src="img/image-9.jpg" alt=""></li>
    <li><img src="img/image-10.jpg" alt=""></li>
  </ul>
</body>
</html>
