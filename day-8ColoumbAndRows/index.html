<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Grid | Columns & Rows</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background-color: #ddd;
      }

      .container {
        width: 600px;
        margin: 50px auto;
        display: grid;
        /* grid-template-columns: 2fr 25% 200px;
        grid-template-rows: 200px 25% auto; */
        /* Implisit and Eksplisit */
        /* grid-template-columns: 100px 50px;
        grid-template-rows: 50px 100px 150px;
        grid-auto-flow: column; */
        /* Repeat */
        /* grid-template-columns: repeat(4,1.5fr) repeat(5,1fr); */
        /* min-max content */
        /* grid-template-columns: min-content; */
        /* auto fill and auto fit */
        /* grid-template-columns: repeat(auto-fit,100px); */
        /* minmax */
        grid-template-columns: 1fr minmax(200px, 300px) 1fr;
      }

      .item {
        background-color: rgb(138, 209, 254);
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .item:nth-child(even) {
        background-color: rgb(255, 142, 142);
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="item">1</div>
      <div class="item">2</div>
      <div class="item">3</div>
      <div class="item">4</div>
      <div class="item">5</div>
      <div class="item">6</div>
      <div class="item">7</div>
      <div class="item">8</div>
      <div class="item">9</div>
    </div>
  </body>
</html>
